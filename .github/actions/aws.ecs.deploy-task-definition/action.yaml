name: AWS ECS - Deploy Task Definition
description: Deploy


inputs:
  aws_region:
    required: false
    description: "(Optional) The region of the AWS."
  aws_access_key_id:
    required: false
    description: "(Optional) The access key ID used to authenticate to the AWS."
  aws_secret_access_key:
    required: false
    description: "(Optional) The secret access key used to authenticate to the AWS."
  aws_github_oidc_iam_role:
    required: false
    description: "(Optional) The ARN (Amazon Resource Name) of the IAM role to assume via GitHub OIDC to authenticate."
  aws_github_oidc_session_name:
    required: false
    default: GitHubActions
    description: "(Optional) The identifier for the assumed role session via GitHub OIDC. Defaults to `GitHubActions`."
  aws_github_oidc_audience:
    required: false
    default: sts.amazonaws.com
    description: "(Optional) The OIDC audience to be specified when the JWT is created. Defaults to `sts.amazonaws.com`. This will work for most cases. Changing the default audience may be necessary when using non-default AWS partitions, such as China regions."
  aws_chained_iam_role:
    required: false
    description: "(Optional) The ARN of the chained IAM role to assume after assuming the GitHub OIDC IAM role or after configuring AWS credentials with access key and secret access key."
  aws_chained_session_name:
    required: false
    default: GitHubActions
    description: "(Optional) The identifier for the assumed role session when assuming the chained IAM role. Defaults to `GitHubActions`."

  image:
    required: true
    description: |
      (Required) The new image URI to update in the specified container of the Amazon ECS task definition. The image URI should be in the format of `repository-uri:tag` or `repository-uri@digest`. For example, `123456789012.dkr.ecr.us-west-2.amazonaws.com/my-web-app:latest`.
      Supported placeholders:
      - <pr-number>: Pull request number
      - <source-branch>: Source branch name (e.g., `feature-branch`)
      - <target-branch>: Target branch name (e.g., `main`)
      - <ref-name>: Reference name (e.g., `pr-123`, `main`, `v1.0.0`)
      - <sha>: Full commit SHA
      - <short-sha>: Short commit SHA (7 chars)
      - <repo-name>: Repository name
      - <owner>: Repository owner
  docker_labels:
    required: false
    description: |
      (Optional) Docker labels to add to the container. Each label is of the form KEY=value, you can specify multiple labels with multi-line YAML strings.
      Supported placeholders:
      - <pr-number>: Pull request number
      - <source-branch>: Source branch name (e.g., `feature-branch`)
      - <target-branch>: Target branch name (e.g., `main`)
      - <ref-name>: Reference name (e.g., `pr-123`, `main`, `v1.0.0`)
      - <sha>: Full commit SHA
      - <short-sha>: Short commit SHA (7 chars)
      - <repo-name>: Repository name
      - <owner>: Repository owner
  environment_variables:
    required: false
    description: |
      (Optional) Variables to add to the container. Each variable is of the form KEY=value, you can specify multiple variables with multi-line YAML strings.
      Supported placeholders:
      - <pr-number>: Pull request number
      - <source-branch>: Source branch name (e.g., `feature-branch`)
      - <target-branch>: Target branch name (e.g., `main`)
      - <ref-name>: Reference name (e.g., `pr-123`, `main`, `v1.0.0`)
      - <sha>: Full commit SHA
      - <short-sha>: Short commit SHA (7 chars)
      - <repo-name>: Repository name
      - <owner>: Repository owner
  secrets:
    required: false
    description: |
      (Optional) Secrets to add to the container. Each secret is of the form KEY=valueFrom, where valueFrom is a secret arn. You can specify multiple secrets with multi-line YAML strings.
      Supported placeholders:
      - <pr-number>: Pull request number
      - <source-branch>: Source branch name (e.g., `feature-branch`)
      - <target-branch>: Target branch name (e.g., `main`)
      - <ref-name>: Reference name (e.g., `pr-123`, `main`, `v1.0.0`)
      - <sha>: Full commit SHA
      - <short-sha>: Short commit SHA (7 chars)
      - <repo-name>: Repository name
      - <owner>: Repository owner
  command:
    required: false
    description: |
      (Optional) The command used by ECS to start the container image.
      Supported placeholders:
      - <pr-number>: Pull request number
      - <source-branch>: Source branch name (e.g., `feature-branch`)
      - <target-branch>: Target branch name (e.g., `main`)
      - <ref-name>: Reference name (e.g., `pr-123`, `main`, `v1.0.0`)
      - <sha>: Full commit SHA
      - <short-sha>: Short commit SHA (7 chars)
      - <repo-name>: Repository name
      - <owner>: Repository owner

  wait_for_service_stability:
    required: false
    default: "true"
    description: "(Optional) Whether to wait for the ECS service to reach a stable state after deploying the new task definition. Defaults to `true`."
  wait_for_minutes:
    required: false
    default: "10"
    description: "(Optional) How long to wait for the ECS service to reach stable state, in minutes (default: 30 minutes, max: 6 hours). For CodeDeploy deployments, any wait time configured in the CodeDeploy deployment group will be added to this value. Defaults to `10` minutes."
  force_new_deployment:
    required: false
    default: "false"
    description: "(Optional) Whether to force a new deployment of the service. Valid value is `true`. Will default to not force a new deployment."

  aws_ecs_cluster:
    required: true
    description: "(Required) The name of the ECS cluster to deploy to."
  aws_ecs_service:
    required: true
    description: "(Required) The name of the ECS service to deploy to."
  aws_ecs_task_definition:
    required: true
    description: "(Required) A name of the Amazon ECS task definition."
  aws_ecs_container:
    required: true
    description: "(Required) The name of the container in the Amazon ECS task definition to update with the new image."
  aws_ecs_managed_tags_enabled:
    required: false
    default: "true"
    description: "(Optional) Whether to turn on Amazon ECS managed tags 'aws:ecs:serviceName' and 'aws:ecs:clusterName' for the tasks in the service. Defaults to `true`."
  aws_ecs_propagate_tags:
    required: false
    default: "TASK_DEFINITION"
    description: "(Optional) How to propagate tags. Valid values are `TASK_DEFINITION`, `SERVICE`, and `NONE`. Defaults to `TASK_DEFINITION`."

outputs:
  task_definition_arn:
    value: ${{ steps.deploy-task-definition.outputs.task-definition-arn }}
    description: "The ARN of the deployed Amazon ECS task definition."
  container:
    value: ${{ inputs.aws_ecs_container }}
    description: "The name of the container in the Amazon ECS task definition that was updated."
  image:
    value: ${{ steps.render-templates.outputs.interpolated.image }}
    description: "The deployed image URI of the container."
  command:
    value: ${{ steps.render-templates.outputs.interpolated.command }}
    description: "The deployed command for the container."


runs:
  using: composite

  steps:
  - name: Configure AWS Credentials
    id: configure-aws-credentials
    uses: tedilabs/github-actions/.github/actions/aws.configure-credentials@main
    with:
      aws_region: ${{ inputs.aws_region }}
      aws_access_key_id: ${{ inputs.aws_access_key_id }}
      aws_secret_access_key: ${{ inputs.aws_secret_access_key }}
      aws_github_oidc_iam_role: ${{ inputs.aws_github_oidc_iam_role }}
      aws_github_oidc_session_name: ${{ inputs.aws_github_oidc_session_name }}
      aws_github_oidc_audience: ${{ inputs.aws_github_oidc_audience }}
      aws_chained_iam_role: ${{ inputs.aws_chained_iam_role }}
      aws_chained_session_name: ${{ inputs.aws_chained_session_name }}

  - name: Download Task Definition
    id: download-task-definition
    continue-on-error: false
    shell: bash
    run: |
      TEMP_DIR=$(mktemp -d)

      aws ecs describe-task-definition --task-definition "${{ inputs.aws_ecs_task_definition }}" --query taskDefinition > ${TEMP_DIR}/task-definition.json

      echo "TASK_DEFINITION_PATH=${TEMP_DIR}/task-definition.json" >> $GITHUB_ENV

  - name: Build Templates
    id: build-templates
    shell: bash
    env:
      INPUT_IMAGE: ${{ inputs.image }}
      INPUT_DOCKER_LABELS: ${{ inputs.docker_labels }}
      INPUT_ENV_VARS: ${{ inputs.environment_variables }}
      INPUT_SECRETS: ${{ inputs.secrets }}
      INPUT_COMMAND: ${{ inputs.command }}
    run: |
      JSON=$(jq -cn \
        --arg image "$INPUT_IMAGE" \
        --arg docker_labels "$INPUT_DOCKER_LABELS" \
        --arg environment_variables "$INPUT_ENV_VARS" \
        --arg secrets "$INPUT_SECRETS" \
        --arg command "$INPUT_COMMAND" \
        '{image: $image, docker_labels: $docker_labels, environment_variables: $environment_variables, secrets: $secrets, command: $command}')
      echo "json=$JSON" >> $GITHUB_OUTPUT

  - name: Render Templates
    id: render-templates
    uses: tedilabs/github-actions/.github/actions/misc.string-interpolation@main
    with:
      inputs: ${{ steps.build-templates.outputs.json }}

  - name: Render Task Definition
    id: render-task-definition
    continue-on-error: false
    uses: aws-actions/amazon-ecs-render-task-definition@v1
    with:
      task-definition: ${{ env.TASK_DEFINITION_PATH }}
      container-name: ${{ inputs.aws_ecs_container }}
      image: ${{ fromJSON(steps.render-templates.outputs.interpolated).image }}
      docker-labels: ${{ fromJSON(steps.render-templates.outputs.interpolated).docker_labels}}
      environment-variables: ${{ fromJSON(steps.render-templates.outputs.interpolated).environment_variables }}
      secrets: ${{ fromJSON(steps.render-templates.outputs.interpolated).secrets }}
      command: ${{ fromJSON(steps.render-templates.outputs.interpolated).command }}

  - name: Deploy Amazon ECS task definition
    id: deploy-task-definition
    continue-on-error: false
    uses: aws-actions/amazon-ecs-deploy-task-definition@v2
    with:
      cluster: ${{ inputs.aws_ecs_cluster }}
      service: ${{ inputs.aws_ecs_service }}
      task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
      enable-ecs-managed-tags: ${{ inputs.aws_ecs_managed_tags_enabled }}
      propagate-tags: ${{ inputs.aws_ecs_propagate_tags }}
      wait-for-service-stability: ${{ inputs.wait_for_service_stability }}
      wait-for-minutes: ${{ inputs.wait_for_minutes }}
      force-new-deployment: ${{ inputs.force_new_deployment }}
